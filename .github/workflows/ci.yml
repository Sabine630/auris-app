name: CI

# dev 分支與 dev→main PR 的自動測試＋建置檢查。正式版部署是另一條 workflow（deploy.yml，只看 main）。
# 注意：main 的 branch protection 以本檔的 job id「test-build」為 required status check，
# 改 job id 前必須同步更新 GitHub 分支保護設定，否則 PR 會永遠卡在 Expected。
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'auris-vue/package-lock.json'

      - name: Check project config
        run: node scripts/check-project-config.mjs

      - name: Install dependencies
        working-directory: ./auris-vue
        run: npm ci

      # 依賴弱點掃描：有 high（含）以上等級漏洞就讓 CI 紅燈（P105 後加入的資安防線）
      - name: Audit dependencies
        working-directory: ./auris-vue
        run: npm audit --audit-level=high

      - name: Run tests
        working-directory: ./auris-vue
        run: npm run test

      - name: Build
        working-directory: ./auris-vue
        run: npm run build
