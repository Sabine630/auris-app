name: CI (dev)

# dev 分支的自動測試＋建置檢查。正式版部署是另一條 workflow（deploy.yml，只看 main）。
on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'auris-vue/package-lock.json'

      - name: Install dependencies
        working-directory: ./auris-vue
        run: npm install

      - name: Run tests
        working-directory: ./auris-vue
        run: npm run test

      - name: Build
        working-directory: ./auris-vue
        run: npm run build
