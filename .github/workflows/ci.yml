name: CI

# dev 分支與 dev→main PR 的自動測試＋建置檢查。正式版部署是另一條 workflow（deploy.yml，只看 main）。
# 注意：main 的 branch protection 以本檔的 job id「test-build」為 required status check，
# 改 job id 前必須同步更新 GitHub 分支保護設定，否則 PR 會永遠卡在 Expected。
on:
  push:
    branches:
      - dev
  # branches 比對的是 PR 的「目標」分支：main＝發布 PR，dev＝Dependabot 更新 PR，
  # 少列 dev 會讓 Dependabot PR 合併前完全沒有 CI（復查發現的缺口）
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

# GITHUB_TOKEN 最小權限：本 workflow 只需讀 code（CodeQL actions/missing-workflow-permissions）
permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      # 第三方 action 一律釘 commit SHA（防 tag 被改指到惡意 commit 的供應鏈攻擊）；
      # 註解版號供人讀，Dependabot（github-actions ecosystem）會自動開 PR 更新
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'auris-vue/package-lock.json'

      - name: Check project config
        run: node scripts/check-project-config.mjs

      - name: Install dependencies
        working-directory: ./auris-vue
        run: npm ci

      # 依賴弱點掃描：有 high（含）以上等級漏洞就讓 CI 紅燈（P105 後加入的資安防線）
      - name: Audit dependencies
        working-directory: ./auris-vue
        run: npm audit --audit-level=high

      - name: Run tests
        working-directory: ./auris-vue
        run: npm run test

      - name: Build
        working-directory: ./auris-vue
        run: npm run build
