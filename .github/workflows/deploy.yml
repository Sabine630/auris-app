name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 第三方 action 一律釘 commit SHA（防 tag 被改指到惡意 commit 的供應鏈攻擊）；
      # 註解版號供人讀，Dependabot（github-actions ecosystem）會自動開 PR 更新
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'auris-vue/package-lock.json'

      - name: Check project config
        run: node scripts/check-project-config.mjs
          
      - name: Install dependencies
        working-directory: ./auris-vue
        run: npm ci

      - name: Audit dependencies
        working-directory: ./auris-vue
        run: npm audit --audit-level=high

      - name: Run tests
        working-directory: ./auris-vue
        run: npm test
        
      - name: Build
        working-directory: ./auris-vue
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: './auris-vue/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
