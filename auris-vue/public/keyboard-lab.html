<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0e0d">
  <title>Auris Plain Keyboard Lab</title>
  <style>
    *{box-sizing:border-box}
    html{min-height:100%;background:#0f0e0d;color:#e8ddd8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;min-height:100dvh;background:#0f0e0d}
    main{min-height:100dvh;padding:max(18px,env(safe-area-inset-top)) 18px max(24px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:18px}
    h1{margin:0;color:#d49080;font-size:22px}
    p{margin:0;color:#b0a098;font-size:14px;line-height:1.6}
    pre{margin:0;padding:12px;border:1px solid #39332f;border-radius:10px;background:#1a1816;color:#e8ddd8;font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap}
    .reference{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .block{min-height:82px;padding:12px;border:1px solid #39332f;border-radius:12px;background:#1a1816;color:#b0a098}
    .block:nth-child(2n){background:#222018}
    label{margin-top:auto;color:#d49080;font-size:13px}
    input{width:100%;padding:14px;border:1px solid #504640;border-radius:12px;background:#1a1816;color:#e8ddd8;font-size:16px;outline:none}
    input:focus{border-color:#d49080}
    a{color:#d49080;font-size:13px}
  </style>
</head>
<body>
  <main>
    <h1>Plain Keyboard Lab</h1>
    <p>No Vue shell. In standalone mode, focus the input below and keep the keyboard open. Watch whether any reference block disappears.</p>
    <pre id="metrics">Loading...</pre>
    <div class="reference" aria-label="Reference blocks">
      <div class="block">Reference A</div>
      <div class="block">Reference B</div>
      <div class="block">Reference C</div>
      <div class="block">Reference D</div>
      <div class="block">Reference E</div>
      <div class="block">Reference F</div>
    </div>
    <label for="plain-input">Test input</label>
    <input id="plain-input" type="text" autocomplete="off" placeholder="Tap here to open the keyboard">
    <a href="./?kbdiag=1">Back to Auris diagnostics</a>
  </main>
  <script>
    (() => {
      const output = document.getElementById('metrics');
      const input = document.getElementById('plain-input');
      const vv = window.visualViewport;
      const standalone = navigator.standalone === true
        || window.matchMedia('(display-mode: standalone)').matches;
      const number = value => Number.isFinite(value) ? value.toFixed(1) : 'NA';
      const render = reason => {
        output.textContent = [
          `plain-lab | ${standalone ? 'standalone' : 'browser'}`,
          `event ${reason}`,
          `vv h ${number(vv?.height)} | top ${number(vv?.offsetTop)}`,
          `window h ${number(window.innerHeight)}`,
          `document h ${number(document.documentElement.getBoundingClientRect().height)}`,
          `focus ${document.activeElement === input ? 'input' : 'other'}`
        ].join('\n');
      };
      vv?.addEventListener('resize', event => render(`vv:${event.type}`));
      vv?.addEventListener('scroll', event => render(`vv:${event.type}`));
      document.addEventListener('focusin', event => render(event.type));
      document.addEventListener('focusout', event => render(event.type));
      render('install');
    })();
  </script>
</body>
</html>
